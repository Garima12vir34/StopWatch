<!DOCTYPE html>
<html lang="en">
<head>
    <title>StopWatch</title>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styling.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/jqueryui/1.14.1/themes/blitzer/jquery-ui.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.14.1/jquery-ui.min.js"></script>
</head>
<body>
    <div class="container-fluid">
        <video  class="bg-section" muted loop autoplay><source src="ss.mp4" type="video/mp4"></video>
        <div class="header">StopWatch</div>
        <div class="lap"><span id="lapmin">00</span>:<span id="lapsec">00</span>:<span id="lapcs">00</span></div>
        <div class="timer"><span id="timermin">00</span>:<span id="timersec">00</span>:<span id="timercs">00</span></div>
        <div class="row justify-content-center gap-3">
            <div class="col-auto"><a class="btn btn-lg startbtn">Start</a></div>
            <div class="col-auto"><a class="btn btn-lg lapbtn">Lap</a></div>
        </div>
        <!--laps-->
        <div id="Laps"></div>
   
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="jquery.js" type="text/javascript"></script>
</body>
</html>
